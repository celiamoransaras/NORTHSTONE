<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0C4A6E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Northstone" />
    <meta name="description" content="Tu plataforma de gestión deportiva" />
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS splash screens -->
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1290x2796.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1179x2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1170x2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1080x1920.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/splash-750x1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/splash-828x1792.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Northstone</title>
  </head>
  <body>
    <div id="root">
      <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#F0EFED;font-family:sans-serif;gap:16px">
        <div style="font-size:48px;font-weight:900;letter-spacing:2px"><span style="color:#0C4A6E">N</span>ORTHSTONE</div>
        <div style="color:#888;font-size:14px">Cargando...</div>
      </div>
    </div>
    <script>
      // Capturar errores JS antes de que React monte
      window.onerror = function(msg, src, line, col, err) {
        var r = document.getElementById('app-loading')
        if (r) r.innerHTML = '<div style="text-align:center;padding:32px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Error de carga</div><div style="color:#888;font-size:12px;margin-bottom:16px;max-width:280px;margin-left:auto;margin-right:auto">' + msg + '</div><button onclick="navigator.serviceWorker&&navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(sw){sw.unregister()})});caches.keys().then(function(k){k.forEach(function(c){caches.delete(c)})});setTimeout(function(){location.reload(true)},300)" style="background:#0C4A6E;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer">Reiniciar app</button></div>'
      }
      // Si el JS no carga en 8s, mostrar botón de reinicio
      setTimeout(function() {
        var r = document.getElementById('app-loading')
        if (r) {
          r.innerHTML = '<div style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Error al cargar</div><div style="color:#888;font-size:14px;margin-bottom:24px">Pulsa el botón para reiniciar la app</div><button onclick="navigator.serviceWorker&&navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(sw){sw.unregister()})});caches.keys().then(function(k){k.forEach(function(c){caches.delete(c)})});setTimeout(function(){location.reload(true)},300)" style="background:#0C4A6E;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer">Reiniciar app</button></div>'
        }
      }, 8000)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
